name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Submodule'ları burada çekme ve repo-token'ını git config'e yazma.
          # Submodule'lar BAŞKA (public) repolar; token onlara geçersiz → 403.
          submodules: false
          persist-credentials: false

      - name: Fetch public submodules (anoniem, geen token)
        run: git submodule update --init --recursive

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Pages'i otomatik aktive et + "GitHub Actions" kaynağına ayarla
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
